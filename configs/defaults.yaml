run:
  name: basd_imagenet
  output_dir: ./outputs
  seed: 42

data:
  dataset: ILSVRC/imagenet-1k
  eval_datasets:
    - barkermrl/imagenet-a
    - axiong/imagenet-r
    - songweig/imagenet_sketch
  batch_size: 256

model:
  student_preset: deit_tiny
  vit:
    img_size: 224
    patch_size: 16

checkpoint:
  resume_from: null
  path: null

training:
  mode: distill
  num_epochs: 300
  learning_rate: 1.0e-3

basd:
  teacher_model_name: dinov3_vitb16
  teacher_loader: dinov3
  num_extraction_points: 4
  disabled_components: []
  layer_selector_fixed_rank: 0
  rsd_kappa: 5.0e-3
  uwso_temperature: 5.0

presets:
  deit_tiny:
    embed_dim: 192
    depth: 12
    num_heads: 3
  deit_small:
    embed_dim: 384
    depth: 12
    num_heads: 6
